<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Modul Referensi - YOMIKATA</title>
<style>
  /* CSS konsisten dengan tema utama, namun difokuskan untuk tabel dan membaca */
  :root { --bg-main: #0f172a; --primary: #38bdf8; --success: #22c55e; --warning: #eab308; --text-main: #f8fafc; --text-sub: #94a3b8; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
  .container { width: 100%; max-width: 600px; }
  
  /* Tombol Kembali */
  .btn-back { background: #1e293b; color: var(--text-main); border: 1px solid #334155; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px;}
  .btn-back:hover { border-color: var(--primary); color: var(--primary); }

  /* Desain Tabel Buku Saku */
  table { width: 100%; border-collapse: collapse; background: rgba(30, 41, 59, 0.5); border-radius: 10px; overflow: hidden; margin-bottom: 30px; }
  th { background: rgba(56, 189, 248, 0.2); color: var(--primary); padding: 12px; text-align: left; }
  td { padding: 12px; border-bottom: 1px dashed rgba(255,255,255,0.1); }
  tr:last-child td { border-bottom: none; }
</style>
</head>
<body>

<div class="container">
  <button class="btn-back" onclick="window.location.href='index.html'">⬅️ Kembali ke Aplikasi Utama</button>
  
  <h1 style="color: var(--primary); text-align: center; margin-bottom: 5px;">MODUL ANGKA</h1>
  <p style="color: var(--text-sub); text-align: center; margin-top: 0; margin-bottom: 25px;">Penyebutan Dasar & Satuan</p>

  </div>

</body>
</html>
